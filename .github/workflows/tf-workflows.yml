name: "🌎 Terraform Apply (Reusable)"

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner label(s) for the job"
        required: false
        type: string
        default: "ubuntu-latest"
      working_directory:
        description: "Root directory of the Terraform configuration"
        required: true
        type: string
        default: terraform
      backend_config:
        description: "Terraform backend config flags (space-separated)"
        required: false
        type: string
        default: ""
      terraform_version:
        description: "Terraform version"
        required: false
        type: string
        default: "1.13.3"
      approvers:
        required: false
        type: string
        description: 'Approvals list to approve apply or destroy'  
        default: architch-aster
      timeout:
        required: false
        type: number
        default: 2
        description: 'Timeout for approval step'  
      minimum-approvals:
        required: false
        type: number
        default: 1
        description: 'Minimum approvals required to accept the plan' 
      var_file:
        required: true
        default: ""
        type: string
        description: 'Terraform var file directory. e.g. vars/dev.tfvars'

    secrets:
      AZURE_CREDENTIALS:
        description: "Azure Credentials to authenticate Azure CLI"
        required: true


jobs:
  apply:
    name: "Terraform Apply"
    runs-on: ${{ inputs.runs-on }}
    env:                                                        
      ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
      ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
      ARM_USE_AZUREAD: true

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v5

      # 👇 IMPORTANT: make sure Node.js + base tools + Azure CLI exist (for self-hosted)
      - name: 🔧 Ensure Node.js & CLI dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e

          # ----- Node.js (required for JavaScript actions) -----
          if ! command -v node >/dev/null 2>&1; then
            echo "Node.js not found, installing Node 20..."
            if command -v apt-get >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get update -y
              sudo apt-get install -y nodejs
            else
              echo "apt-get not available; install Node.js manually on this runner."
              exit 1
            fi
          else
            echo "Node.js present: $(node -v)"
          fi

          # ----- Base packages (useful for Az + general) -----
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y \
              curl \
              unzip \
              git \
              ca-certificates \
              gnupg \
              lsb-release
          fi

          # ----- Azure CLI (for azure/login when using auth-type=azurecli/kubelogin later) -----
          if ! command -v az >/dev/null 2>&1; then
            echo "Azure CLI not found, installing..."
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          else
            echo "Azure CLI already installed: $(az version | head -n 1 || true)"
          fi

      - name: ☁️ Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up smurf                  
        uses: clouddrove/smurf@master
        with:
          version: latest

      - name: 🔧 Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: 🧹 Terraform Format Check
        run: terraform fmt --recursive

      - name: 🏗️ Terraform Init
        run: |
          cd ${{ inputs.working_directory}}
          smurf stf init

      - name: 📋 Terraform Plan
        run: |
          cd ${{ inputs.working_directory}}
          smurf stf plan --var-file=${{ inputs.var_file }} --out=tfplan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Manual approval to Accept plan or deny
        uses: trstringer/manual-approval@v1
        timeout-minutes: ${{ inputs.timeout }}
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ inputs.approvers }}
          minimum-approvals: ${{ inputs.minimum-approvals }}  

      - name: 🚀 Terraform Apply
        run: |
          cd ${{ inputs.working_directory }}
          terraform apply tfplan